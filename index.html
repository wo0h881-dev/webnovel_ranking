<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>통합 웹소설 TOP 40</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>통합 웹소설 TOP 40</h1>
    <p class="subtitle">네이버 시리즈 · 카카오페이지 일간 TOP 20 통합 랭킹</p>

    <!-- 상단: 일별 웹소설 박스오피스 -->
    <section class="section-daily-boxoffice">
      <h2>일별 웹소설 박스오피스 TOP 10</h2>
      <div class="toolbar">
        <select id="source-filter">
          <option value="all">전체</option>
          <option value="naver">네이버</option>
          <option value="kakao">카카오</option>
        </select>
      </div>
      <table class="daily-table">
        <thead>
          <tr>
            <th>썸네일</th>
            <th>순위</th>
            <th>제목</th>
            <th>작가</th>
            <th>플랫폼</th>
            <th>오늘 조회수</th>
            <th>전일 순위</th>
            <th>순위 변화</th>
            <th>전일 대비</th>
          </tr>
        </thead>
        <tbody id="daily-tbody"></tbody>
      </table>
    </section>

    <!-- 하단: 통합 TOP 40 카드 -->
    <section class="section-cards">
      <div class="tabs">
        <button class="tab active" data-filter="all">통합</button>
        <button class="tab" data-filter="naver">네이버</button>
        <button class="tab" data-filter="kakao">카카오</button>
      </div>

      <div id="status" class="status"></div>
      <div id="card-grid" class="card-grid"></div>
    </section>
  </div>

  <script src="script.js"></script>

  <!-- 상세 레이어(모달) -->
<div id="detail-layer" class="detail-layer hidden">
  <div class="detail-backdrop"></div>
  <div class="detail-panel">
    <div class="detail-header">
  <h2 id="detail-title">
    <span class="detail-title-text">작품 제목</span>
    <span class="detail-platform-badge detail-platform--kakao">카카오</span>
    <!-- 네이버면 detail-platform--naver -->
  </h2>
  <button id="detail-close" class="detail-close">×</button>
</div>


    <!-- 탭 버튼 -->
    <div class="detail-tabs">
      <button class="detail-tab active" data-tab="info">기본정보</button>
      <button class="detail-tab" data-tab="chart">히스토리 차트</button>
      <button class="detail-tab" data-tab="memo">메모</button>
    </div>

    <!-- 탭 내용 -->
    <div class="detail-contents">
      <div class="detail-pane active" data-tab="info">
        <div id="detail-meta"></div>
      </div>

      <div class="detail-pane" data-tab="chart">
        <canvas id="detail-chart" height="200"></canvas>
      </div>

      <div class="detail-pane" data-tab="memo">
        <textarea id="detail-memo" rows="6" style="width:100%;"></textarea>
      </div>
    </div>
  </div>
</div>

</body>
</html>

<div id="detail-modal" class="modal hidden">
  <div class="modal-content">
    <button id="modal-close">닫기</button>
    <h2 id="modal-title"></h2>
    <canvas id="viewChart"></canvas>
    <canvas id="rankChart"></canvas>
  </div>
</div>
